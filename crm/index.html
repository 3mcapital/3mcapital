<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3M Capital CRM - 客戶管理</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 登入畫面 -->
    <div id="login-screen" class="login-screen">
        <div class="login-box">
            <div class="login-logo">📊</div>
            <h1>3M Capital CRM</h1>
            <p class="login-subtitle">請輸入帳號密碼登入</p>
            <form id="login-form">
                <div class="form-group">
                    <input type="text" id="login-username" placeholder="帳號" required>
                </div>
                <div class="form-group">
                    <input type="password" id="login-password" placeholder="密碼" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">登入</button>
                <p id="login-error" class="login-error"></p>
            </form>
        </div>
    </div>

    <header id="main-header" style="display: none;">
        <div class="logo">
            <div class="logo-icon">📊</div>
            <span>3M Capital CRM</span>
        </div>
        <nav>
            <a href="#" class="active" data-page="contacts">客戶資料</a>
            <a href="#" data-page="deals">銷售機會</a>
            <a href="#" data-page="tasks">任務</a>
        </nav>
        <button class="btn btn-sm btn-logout" onclick="AUTH.logout()">登出</button>
    </header>

    <main>
        <!-- 客戶資料頁面 -->
        <section id="contacts-page" class="page">
            <div class="page-header">
                <h1 class="page-title">客戶資料管理</h1>
                <button class="btn btn-primary" onclick="openModal('add')">
                    <span>+</span> 新增客戶
                </button>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="total-contacts">0</div>
                    <div class="stat-label">總客戶數</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="total-phone">0</div>
                    <div class="stat-label">已存電話</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="total-email">0</div>
                    <div class="stat-label">已存Email</div>
                </div>
            </div>

            <div class="search-bar">
                <input type="text" id="search-input" placeholder="搜尋客戶名稱、電話或Email...">
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>客戶名稱</th>
                            <th>電話</th>
                            <th>Email</th>
                            <th>備註</th>
                            <th>建立日期</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="contacts-table">
                        <!-- 資料會在這裡動態生成 -->
                    </tbody>
                </table>
            </div>

            <div class="empty-state" id="empty-state" style="display: none;">
                <div class="empty-state-icon">📋</div>
                <p>尚無客戶資料，點擊上方按鈕新增</p>
            </div>
        </section>

        <!-- 銷售機會頁面 (預留) -->
        <section id="deals-page" class="page" style="display: none;">
            <div class="page-header">
                <h1 class="page-title">銷售機會</h1>
            </div>
            <div class="empty-state">
                <div class="empty-state-icon">💼</div>
                <p>功能開發中...</p>
            </div>
        </section>

        <!-- 任務頁面 (預留) -->
        <section id="tasks-page" class="page" style="display: none;">
            <div class="page-header">
                <h1 class="page-title">任務管理</h1>
            </div>
            <div class="empty-state">
                <div class="empty-state-icon">✅</div>
                <p>功能開發中...</p>
            </div>
        </section>
    </main>

    <!-- 新增/編輯客戶 Modal -->
    <div class="modal" id="contact-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title">新增客戶</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form id="contact-form">
                <input type="hidden" id="contact-id">
                <div class="form-group">
                    <label for="contact-name">客戶名稱 *</label>
                    <input type="text" id="contact-name" required>
                </div>
                <div class="form-group">
                    <label for="contact-phone">電話</label>
                    <input type="tel" id="contact-phone">
                </div>
                <div class="form-group">
                    <label for="contact-email">Email</label>
                    <input type="email" id="contact-email">
                </div>
                <div class="form-group">
                    <label for="contact-notes">備註</label>
                    <input type="text" id="contact-notes">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">儲存</button>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 3M Capital CRM. All rights reserved.</p>
    </footer>

    <script>
        // 登入驗證
        const AUTH = {
            users: JSON.parse(localStorage.getItem('crm_users')) || [],
            
            init() {
                // 如果沒有帳號，创建默认管理员
                if (this.users.length === 0) {
                    this.users = [{ username: 'admin', password: 'admin123', role: 'admin' }];
                    localStorage.setItem('crm_users', JSON.stringify(this.users));
                }
                
                // 檢查是否已登入
                const isLoggedIn = localStorage.getItem('crm_logged_in');
                if (isLoggedIn) {
                    this.showMainApp();
                } else {
                    this.showLoginScreen();
                }
            },
            
            showLoginScreen() {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('main-header').style.display = 'none';
                document.querySelector('main').style.display = 'none';
                document.querySelector('footer').style.display = 'none';
            },
            
            showMainApp() {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-header').style.display = 'flex';
                document.querySelector('main').style.display = 'block';
                document.querySelector('footer').style.display = 'block';
            },
            
            login(username, password) {
                const user = this.users.find(u => u.username === username && u.password === password);
                if (user) {
                    localStorage.setItem('crm_logged_in', JSON.stringify(user));
                    this.showMainApp();
                    return { success: true };
                }
                return { success: false, message: '帳號或密碼錯誤' };
            },
            
            logout() {
                localStorage.removeItem('crm_logged_in');
                this.showLoginScreen();
            },
            
            isLoggedIn() {
                return localStorage.getItem('crm_logged_in') !== null;
            }
        };

        // 登入表單提交
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const result = AUTH.login(username, password);
            
            if (!result.success) {
                document.getElementById('login-error').textContent = result.message;
            } else {
                document.getElementById('login-error').textContent = '';
            }
        });

        // CRM 數據管理
        const CRM = {
            contacts: JSON.parse(localStorage.getItem('crm_contacts')) || [],
            
            save() {
                localStorage.setItem('crm_contacts', JSON.stringify(this.contacts));
            },
            
            add(contact) {
                contact.id = Date.now();
                contact.created = new Date().toLocaleDateString('zh-TW');
                this.contacts.push(contact);
                this.save();
            },
            
            update(id, data) {
                const index = this.contacts.findIndex(c => c.id === id);
                if (index !== -1) {
                    this.contacts[index] = { ...this.contacts[index], ...data };
                    this.save();
                }
            },
            
            delete(id) {
                this.contacts = this.contacts.filter(c => c.id !== id);
                this.save();
            },
            
            search(query) {
                const q = query.toLowerCase();
                return this.contacts.filter(c => 
                    c.name.toLowerCase().includes(q) ||
                    (c.phone && c.phone.includes(q)) ||
                    (c.email && c.email.toLowerCase().includes(q))
                );
            }
        };

        // 渲染客戶列表
        function renderContacts(contacts = CRM.contacts) {
            const tbody = document.getElementById('contacts-table');
            const emptyState = document.getElementById('empty-state');
            
            if (contacts.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            tbody.innerHTML = contacts.map((c, i) => `
                <tr>
                    <td>${i + 1}</td>
                    <td><strong>${c.name || '-'}</strong></td>
                    <td>${c.phone || '-'}</td>
                    <td>${c.email || '-'}</td>
                    <td>${c.notes || '-'}</td>
                    <td>${c.created || '-'}</td>
                    <td class="actions">
                        <button class="btn btn-sm btn-primary" onclick="editContact(${c.id})">編輯</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteContact(${c.id})">刪除</button>
                    </td>
                </tr>
            `).join('');
        }

        // 更新統計
        function updateStats() {
            const contacts = CRM.contacts;
            document.getElementById('total-contacts').textContent = contacts.length;
            document.getElementById('total-phone').textContent = contacts.filter(c => c.phone).length;
            document.getElementById('total-email').textContent = contacts.filter(c => c.email).length;
        }

        // 搜尋功能
        document.getElementById('search-input').addEventListener('input', (e) => {
            const results = e.target.value ? CRM.search(e.target.value) : CRM.contacts;
            renderContacts(results);
        });

        // Modal 控制
        function openModal(mode, contact = null) {
            const modal = document.getElementById('contact-modal');
            const form = document.getElementById('contact-form');
            const title = document.getElementById('modal-title');
            
            form.reset();
            
            if (mode === 'add') {
                title.textContent = '新增客戶';
                document.getElementById('contact-id').value = '';
            } else if (mode === 'edit' && contact) {
                title.textContent = '編輯客戶';
                document.getElementById('contact-id').value = contact.id;
                document.getElementById('contact-name').value = contact.name || '';
                document.getElementById('contact-phone').value = contact.phone || '';
                document.getElementById('contact-email').value = contact.email || '';
                document.getElementById('contact-notes').value = contact.notes || '';
            }
            
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('contact-modal').classList.remove('active');
        }

        // 編輯客戶
        function editContact(id) {
            const contact = CRM.contacts.find(c => c.id === id);
            if (contact) {
                openModal('edit', contact);
            }
        }

        // 刪除客戶
        function deleteContact(id) {
            if (confirm('確定要刪除此客戶嗎？')) {
                CRM.delete(id);
                renderContacts();
                updateStats();
            }
        }

        // 表單提交
        document.getElementById('contact-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const id = document.getElementById('contact-id').value;
            const contact = {
                name: document.getElementById('contact-name').value,
                phone: document.getElementById('contact-phone').value,
                email: document.getElementById('contact-email').value,
                notes: document.getElementById('contact-notes').value
            };
            
            if (id) {
                CRM.update(parseInt(id), contact);
            } else {
                CRM.add(contact);
            }
            
            closeModal();
            renderContacts();
            updateStats();
        });

        // 頁面導航
        document.querySelectorAll('nav a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const page = link.dataset.page;
                
                document.querySelectorAll('nav a').forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                
                document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
                document.getElementById(`${page}-page`).style.display = 'block';
            });
        });

        // 初始化
        AUTH.init();
        renderContacts();
        updateStats();
    </script>
</body>
</html>
